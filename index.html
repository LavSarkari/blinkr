<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Primary SEO — Omegle Alternative Keywords -->
    <title>Blinkr | Free Omegle Alternative | Talk to Strangers Instantly</title>
    <meta name="description" content="Blinkr is the leading free Omegle alternative. Talk to strangers anonymously with random text and video chat. No sign up required. Meet new people worldwide instantly." />
    <meta name="keywords" content="omegle alternative, talk to strangers, random chat, anonymous chat, omegle replacement, free video chat, stranger chat, meet strangers online, random video chat, chatroulette alternative, omegle, chat with strangers, online chat rooms, anonymous video chat, blinkr, text chat strangers, video call random, omegle free, chat random people, meet new people online" />
    <meta name="author" content="Blinkr" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://blinkr.lavbytes.in/" />
    <meta property="og:title" content="Blinkr | Free Omegle Alternative | Talk to Strangers" />
    <meta property="og:description" content="The best Omegle alternative. Anonymous random text & video chat with strangers worldwide. No signup required. Swipe. Connect. Repeat." />
    <meta property="og:site_name" content="Blinkr" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Blinkr — Free Omegle Alternative | Talk to Strangers" />
    <meta name="twitter:description" content="Anonymous video & text chat with random strangers. No signup. The best Omegle replacement." />
    
    <!-- Theme & PWA -->
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Blinkr" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Blinkr" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="color-scheme" content="dark" />
    
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="canonical" href="https://blinkr.lavbytes.in/" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Blinkr",
        "url": "https://blinkr.lavbytes.in",
        "description": "Free Omegle alternative. Talk to strangers anonymously with random text and video chat. No sign up required.",
        "applicationCategory": "SocialNetworkingApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Anonymous text chat",
          "Anonymous video chat",
          "Interest-based matching",
          "No registration required",
          "End-to-end encrypted",
          "Mobile-first PWA"
        ]
      },
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "url": "https://blinkr.lavbytes.in",
        "name": "Blinkr",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://blinkr.lavbytes.in/?s={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [{
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://blinkr.lavbytes.in"
        }]
      }
    ]
    </script>

    <!-- Inline loading spinner (shows before JS loads) -->
    <style>
      body { margin: 0; background: #000; }
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #000;
      }
      #root:empty::after {
        content: '';
        width: 40px;
        height: 40px;
        border: 3px solid #111;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: sp .8s linear infinite;
      }
      @keyframes sp { to { transform: rotate(360deg); } }
    </style>
    
    <noscript>
      <style>
        #root:empty::after { display: none; }
      </style>
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;color:#666;font-family:system-ui;text-align:center;padding:2rem;">
        <p>Blinkr requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
